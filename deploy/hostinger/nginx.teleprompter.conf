# Saarwood Teleprompter - Nginx vhost (app subpage example)
# Scenario: main website hosts multiple apps under subpaths.
# Teleprompter is published under /apps/teleprompter/

server {
  listen 80;
  listen [::]:80;
  server_name beta.example.com;

  location /.well-known/acme-challenge/ {
    root /var/www/html;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name beta.example.com;

  ssl_certificate /etc/letsencrypt/live/beta.example.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/beta.example.com/privkey.pem;

  # Main landing page for all apps is served outside this app config.

  # Normalize app base path
  location = /apps/teleprompter {
    return 301 /apps/teleprompter/;
  }

  # Teleprompter backend + SPA under a subpath
  location /apps/teleprompter/ {
    proxy_pass http://127.0.0.1:4000/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # API under app subpath
  location /apps/teleprompter/api/ {
    proxy_pass http://127.0.0.1:4000/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # WebSocket endpoint under app subpath
  location /apps/teleprompter/ws {
    proxy_pass http://127.0.0.1:4000/ws;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
