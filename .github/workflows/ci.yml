name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION=8.24.2
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp
          chmod +x /tmp/gitleaks

      - name: Run gitleaks
        run: /tmp/gitleaks detect --no-banner --redact --source . --config .gitleaks.toml

  ci:
    name: Type-check · Test · Build
    needs: secret-scan
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      # ── Type-check ──────────────────────────────────────────────────────────
      - name: Type-check frontend
        run: npx tsc --noEmit
        working-directory: packages/frontend

      - name: Type-check backend
        run: npx tsc --noEmit
        working-directory: packages/backend

      # ── Lint ────────────────────────────────────────────────────────────────
      - name: Lint frontend
        run: npm run lint
        working-directory: packages/frontend

      - name: Lint backend
        run: npm run lint
        working-directory: packages/backend

      # ── Tests ───────────────────────────────────────────────────────────────
      - name: Test frontend
        run: npm test
        working-directory: packages/frontend

      - name: Test backend
        run: npm test
        working-directory: packages/backend

      # ── Build ────────────────────────────────────────────────────────────────
      - name: Build frontend
        run: npm run build
        working-directory: packages/frontend

      - name: Build backend
        run: npm run build
        working-directory: packages/backend
